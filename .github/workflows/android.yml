name: inkworm-android-ci

on:
  push:
    branches:
      - main
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Get App version
        uses: mikefarah/yq@master
        with:
          cmd: echo "VERSION=$(yq .version pubspec.yaml)" >> $GITHUB_ENV
      - name: "Push version tag from pubspec.yaml"
        uses: EndBug/latest-tag@latest
        with:
          tag-name: ${{ env.VERSION }}
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64
          cache: false
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: dart run flutter_launcher_icons
      - name: Create relevant secret files
        run: |
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "storePassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "storeFile=keystore.jks" >> android/key.properties
      - name: Decode Keystore
        env:
          ENCODED_STRING: ${{ secrets.KEY_BASE_64 }}
        run: |
          echo $ENCODED_STRING | base64 -d > android/app/keystore.jks
      - run: flutter build apk --release --no-tree-shake-icons
      - name: Create Release
        uses: softprops/action-gh-release@v0.1.15
        with:
          name: 'inkworm-${{ env.VERSION }}.apk'
          files: 'build/app/outputs/apk/release/inkworm-${{ env.VERSION }}-release.apk'
          tag_name: ${{ env.VERSION }}

  linux-flatpak:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3
      - name: Get App version
        uses: mikefarah/yq@master
        with:
          cmd: echo "VERSION=$(yq .version pubspec.yaml)" >> $GITHUB_ENV
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64
          cache: false
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build linux --release
      - name: Install Flatpak tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
      - name: Configure Flatpak runtime
        run: |
          flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak install -y flathub org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08
      - name: Create Flatpak bundle
        run: |
          cat > com.example.untitled.yaml <<'EOF'
          app-id: com.example.untitled
          runtime: org.freedesktop.Platform
          runtime-version: '24.08'
          sdk: org.freedesktop.Sdk
          command: untitled
          finish-args:
            - --share=ipc
            - --socket=fallback-x11
            - --socket=wayland
            - --device=dri
            - --filesystem=home
          modules:
            - name: inkworm
              buildsystem: simple
              build-commands:
                - install -Dm755 untitled /app/bin/untitled
                - cp -r lib /app/lib
                - cp -r data /app/data
                - install -Dm644 com.example.untitled.desktop /app/share/applications/com.example.untitled.desktop
                - install -Dm644 assets/inkworm.png /app/share/icons/hicolor/512x512/apps/com.example.untitled.png
              sources:
                - type: dir
                  path: build/linux/x64/release/bundle
                - type: file
                  path: com.example.untitled.desktop
                - type: file
                  path: assets/inkworm.png
          EOF

          cat > com.example.untitled.desktop <<'EOF'
          [Desktop Entry]
          Name=Inkworm
          Exec=untitled
          Type=Application
          Categories=Office;Education;
          Icon=com.example.untitled
          Terminal=false
          EOF

          flatpak-builder --force-clean --repo=repo build-dir com.example.untitled.yaml
          flatpak build-bundle repo inkworm-${VERSION}-linux-x86_64.flatpak com.example.untitled
      - name: Upload Linux Flatpak to Release
        uses: softprops/action-gh-release@v0.1.15
        with:
          tag_name: ${{ env.VERSION }}
          files: inkworm-${{ env.VERSION }}-linux-x86_64.flatpak

  macos-dmg:
    runs-on: macos-latest
    needs: build
    steps:
      - uses: actions/checkout@v3
      - name: Get App version
        uses: mikefarah/yq@master
        with:
          cmd: echo "VERSION=$(yq .version pubspec.yaml)" >> $GITHUB_ENV
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64
          cache: false
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build macos --release
      - name: Create macOS DMG
        run: |
          mkdir -p dmg-root
          cp -R build/macos/Build/Products/Release/untitled.app dmg-root/
          ln -s /Applications dmg-root/Applications
          hdiutil create -volname "Inkworm" -srcfolder dmg-root -ov -format UDZO inkworm-${VERSION}-macos.dmg
      - name: Upload macOS DMG to Release
        uses: softprops/action-gh-release@v0.1.15
        with:
          tag_name: ${{ env.VERSION }}
          files: inkworm-${{ env.VERSION }}-macos.dmg

  windows-exe:
    runs-on: windows-latest
    needs: build
    steps:
      - uses: actions/checkout@v3
      - name: Get App version
        shell: pwsh
        run: |
          $version = (Get-Content pubspec.yaml | Select-String '^version:\s*(.+)$').Matches[0].Groups[1].Value.Trim()
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64
          cache: false
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build windows --release
      - name: Prepare Windows EXE artifact
        shell: pwsh
        run: |
          Copy-Item build/windows/x64/runner/Release/untitled.exe inkworm-$env:VERSION-windows-x86_64.exe
      - name: Upload Windows EXE to Release
        uses: softprops/action-gh-release@v0.1.15
        with:
          tag_name: ${{ env.VERSION }}
          files: inkworm-${{ env.VERSION }}-windows-x86_64.exe
