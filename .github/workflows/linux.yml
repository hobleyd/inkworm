name: inkworm-linux-ci

on:
  push:
    branches:
      - main
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Get App version
        uses: mikefarah/yq@master
        with:
          cmd: echo "VERSION=$(yq .version pubspec.yaml)" >> $GITHUB_ENV
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64
          cache: false
      - run: sudo apt-get update -y
      - run: sudo apt-get install -y ninja-build libgtk-3-dev libmpv-dev libmpv2 binutils coreutils desktop-file-utils fakeroot fuse libgdk-pixbuf2.0-dev patchelf python3-pip python3-setuptools squashfs-tools strace util-linux zsync
      - run: flutter config --enable-linux-desktop
      - run: flutter create --platforms=linux .
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build linux --release
      - name: Prepare bundle assets
        run:
          cp assets/inkworm.png build/linux/x64/release/bundle/inkworm.png
      - name: Install Flatpak tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
      - name: Configure Flatpak runtime
        run: |
          sudo flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08
      - name: Create Flatpak bundle
        run: |
          cat > au.com.sharpblue.inkworm.yaml <<'EOF'
          app-id: au.com.sharpblue.inkworm
          runtime: org.freedesktop.Platform
          runtime-version: '24.08'
          sdk: org.freedesktop.Sdk
          command: inkworm
          finish-args:
            - --share=ipc
            - --socket=fallback-x11
            - --socket=wayland
            - --device=dri
            - --filesystem=home
          modules:
            - name: inkworm
              buildsystem: simple
              build-commands:
                - install -Dm755 inkworm /app/bin/inkworm
                - cp -r lib /app/lib
                - cp -r data /app/data
                - install -Dm644 au.com.sharpblue.inkworm.desktop /app/share/applications/au.com.sharpblue.inkworm.desktop
                - install -Dm644 inkworm.png /app/share/icons/hicolor/512x512/apps/au.com.sharpblue.inkworm.png
              sources:
                - type: dir
                  path: build/linux/x64/release/bundle
                - type: file
                  path: au.com.sharpblue.inkworm.desktop
                - type: file
                  path: assets/inkworm.png
          EOF
          
          cat > au.com.sharpblue.inkworm.desktop <<'EOF'
          [Desktop Entry]
          Name=Inkworm
          Exec=inkworm
          Type=Application
          Categories=Office;Education;
          Icon=au.com.sharpblue.inkworm
          Terminal=false
          EOF
          
          flatpak-builder --force-clean --repo=repo build-dir au.com.sharpblue.inkworm.yaml
          flatpak build-bundle repo inkworm-${VERSION}-linux-x86_64.flatpak au.com.sharpblue.inkworm
      - name: Upload Linux Flatpak to Release
        uses: softprops/action-gh-release@v0.1.15
        with:
          tag_name: ${{ env.VERSION }}
          files: inkworm-${{ env.VERSION }}-linux-x86_64.flatpak
